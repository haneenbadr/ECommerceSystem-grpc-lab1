syntax = "proto3";

option csharp_namespace = "OrderService";

package order;

service OrderGrpc {
  rpc PlaceOrder (PlaceOrderRequest) returns (PlaceOrderResponse);
}

message PlaceOrderRequest {
  int32 id = 1;
  int32 user_id = 2;
  repeated OrderItem items = 3;
}

message OrderItem {
  int32 item_id = 1;
  int32 quantity = 2;
}

message PlaceOrderResponse {
  bool is_success = 1;
  string message = 2;
}
