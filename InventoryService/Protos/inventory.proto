syntax = "proto3";

option csharp_namespace = "InventoryService";

package inventory;


service InventoryGrpc {
  rpc DeductQuantity (DeductQuantityRequest) returns (DeductQuantityResponse);
}


message DeductQuantityRequest {
  int32 item_id = 1;
  int32 quantity = 2;
}


message DeductQuantityResponse {
  bool is_success = 1;
  string message = 2;
}

